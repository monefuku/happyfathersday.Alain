<!DOCTYPE html>
<html>
<head>
<title>Happy Father's Day Alain 💙</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(180deg, #dff6ff, #9edcff, #5bb8f0);
  font-family: Arial, sans-serif;
  text-align: center;
  color: #07539b;
  overflow-x: hidden;
}

.container {
  padding: 50px 20px;
}

h1 {
  font-size: 3.5rem;
  color: #0967d2;
  margin-bottom: 20px;
}

.gift {
  width: 170px;
  height: 140px;
  background: #2494ff;
  margin: 30px auto;
  border-radius: 15px;
  position: relative;
  cursor: pointer;
  box-shadow: 0 15px 30px rgba(0,0,0,0.25);
}

.gift:before {
  content: "";
  position: absolute;
  width: 35px;
  height: 140px;
  background: #004aad;
  left: 68px;
  top: 0;
}

.gift:after {
  content: "🎀";
  position: absolute;
  font-size: 70px;
  top: -55px;
  left: 48px;
}

.tap {
  font-size: 1.3rem;
  font-style: italic;
}

.reveal {
  display: none;
  background: white;
  max-width: 750px;
  margin: 30px auto;
  padding: 30px;
  border-radius: 30px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.25);
  animation: fadeIn 1s ease;
}

.reveal h2 {
  color: #0b63c7;
  font-size: 1.8rem;
}

.reveal p {
  font-size: 1.2rem;
  line-height: 1.6;
}

.ticket-img {
  width: 100%;
  max-width: 650px;
  border-radius: 15px;
  margin: 20px 0;
  box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

.confetti {
  position: fixed;
  top: -10px;
  width: 10px;
  height: 14px;
  animation: fall 3s linear forwards;
  z-index: 999;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(720deg);
    opacity: 0;
  }
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="container">

  <h1>HAPPY FATHER'S DAY</h1>

  <div class="gift" onclick="openGift()"></div>

  <div class="tap">Tap the gift!</div>

  <div class="reveal" id="reveal">
    <h2>💙 For all the gratitude 💙</h2>

    <p>
      We would like to give you a ticket for
      <strong>Les Nuits Guitares</strong>.
    </p>

    <img class="ticket-img" src="IMG_6255.jpeg" alt="Les Nuits Guitares ticket">

    <p>
      We hope this brings you joy, music, and wonderful memories.
    </p>

    <p>
      Enjoy, relax, and have an amazing time! 💙
    </p>
  </div>

</div>

<script>
function openGift() {
  document.getElementById("reveal").style.display = "block";
  createConfetti();
}

function createConfetti() {
  for (let i = 0; i < 100; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.backgroundColor = randomColor();
    c.style.animationDuration = (2 + Math.random() * 3) + "s";
    document.body.appendChild(c);

    setTimeout(() => {
      c.remove();
    }, 5000);
  }
}

function randomColor() {
  const colors = ["#0b63c7", "#4fc3ff", "#ffffff", "#1d8fe3", "#003f88"];
  return colors[Math.floor(Math.random() * colors.length)];
}
</script>

</body>
</html>
