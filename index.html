<!DOCTYPE html>
<html>
<head>
<title>Happy Father's Day Alain 💙</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(180deg, #dff6ff, #9edcff, #5bb8f0);
  font-family: Arial, sans-serif;
  text-align: center;
  color: #07539b;
  overflow-x: hidden;
}

.container {
  min-height: 100vh;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* BIG HAPPY FATHER'S DAY TEXT */
h1 {
  font-size: 5.8rem;
  line-height: 0.9;
  color: #0d5ee8;
  text-transform: uppercase;
  font-weight: 900;
  letter-spacing: 2px;
  margin: 0 0 45px 0;
}

/* BLUE GIFT BOX */
.gift {
  width: 280px;
  height: 220px;
  background: #4eb4ff;
  border-radius: 20px;
  position: relative;
  cursor: pointer;
  box-shadow: 0 20px 40px rgba(0,0,0,.25);
  transition: .3s;
}

.gift:hover {
  transform: scale(1.05);
}

.gift::before {
  content: "";
  position: absolute;
  width: 55px;
  height: 220px;
  background: #0050c8;
  left: 112px;
  top: 0;
}

.gift::after {
  content: "";
  position: absolute;
  width: 280px;
  height: 55px;
  background: #0050c8;
  left: 0;
  top: 82px;
}

/* BLUE BOW */
.bow {
  position: absolute;
  top: -65px;
  left: 72px;
  width: 140px;
  height: 90px;
  z-index: 3;
}

.bow::before,
.bow::after {
  content: "";
  position: absolute;
  width: 65px;
  height: 65px;
  border: 18px solid #0050c8;
  border-radius: 50%;
  top: 10px;
}

.bow::before {
  left: 0;
}

.bow::after {
  right: 0;
}

.knot {
  position: absolute;
  width: 35px;
  height: 35px;
  background: #0050c8;
  border-radius: 50%;
  left: 52px;
  top: 32px;
}

.tap {
  margin-top: 25px;
  font-size: 2rem;
  color: #0b63c7;
  font-style: italic;
}

/* REVEAL CARD */
.reveal {
  display: none;
  width: 90%;
  max-width: 900px;
  background: rgba(255,255,255,.95);
  border-radius: 35px;
  padding: 40px;
  margin-top: 40px;
  box-shadow: 0 20px 50px rgba(0,0,0,.2);
  animation: fadeIn 1s ease;
}

.reveal h2 {
  color: #0b63c7;
  font-size: 2rem;
  letter-spacing: 2px;
}

.reveal p {
  font-size: 1.3rem;
  line-height: 1.6;
  color: #064f9e;
}

.ticket-img {
  width: 100%;
  max-width: 700px;
  border-radius: 18px;
  margin: 20px 0;
  box-shadow: 0 12px 30px rgba(0,0,0,0.25);
}

/* CONFETTI */
.confetti {
  position: fixed;
  top: -10px;
  width: 10px;
  height: 16px;
  animation: fall 3s linear forwards;
  z-index: 999;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(720deg);
    opacity: 0;
  }
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(35px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* PHONE SIZE */
@media (max-width: 600px) {
  h1 {
    font-size: 3.8rem;
  }

  .gift {
    width: 220px;
    height: 175px;
  }

  .gift::before {
    height: 175px;
    left: 87px;
  }

  .gift::after {
    width: 220px;
    top: 65px;
  }

  .bow {
    left: 43px;
  }
}
</style>
</head>

<body>

<div class="container">

  <h1>HAPPY<br>FATHER'S<br>DAY!</h1>

  <div class="gift" onclick="openGift()">
    <div class="bow">
      <div class="knot"></div>
    </div>
  </div>

  <div class="tap">💙 Tap the gift! 💙</div>

  <div class="reveal" id="reveal">
    <h2>💙 FOR ALL THE GRATITUDE 💙</h2>

    <p>
      We would like to give you a special gift.
    </p>

    <p>
      We would like to give you a ticket for
      <strong>Les Nuits Guitares</strong>.
    </p>

    <img class="ticket-img" src="IMG_6255.jpeg" alt="Les Nuits Guitares ticket">

    <p>
      We hope this brings you joy, music, and wonderful memories.
    </p>

    <p>
      <em>Enjoy, relax, and have an amazing time!</em> 💙
    </p>
  </div>

</div>

<script>
function openGift() {
  document.getElementById("reveal").style.display = "block";
  createConfetti();
}

function createConfetti() {
  for (let i = 0; i < 120; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.backgroundColor = randomColor();
    c.style.animationDuration = (2 + Math.random() * 3) + "s";
    document.body.appendChild(c);

    setTimeout(() => {
      c.remove();
    }, 5000);
  }
}

function randomColor() {
  const colors = ["#0b63c7", "#4fc3ff", "#ffffff", "#1d8fe3", "#003f88"];
  return colors[Math.floor(Math.random() * colors.length)];
}
</script>

</body>
</html>
